services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_APP_ENV: ${APP_ENV:-development}
      VITE_APP_DEV_MODE: ${DEV_MODE:-true}
      VITE_SUPABASE_URL: ${SUPABASE_URL:-http://localhost:54421}
      VITE_SUPABASE_ANON_KEY: ${ANON_KEY}
      VITE_API_URL: ${API_URL:-http://localhost:54800}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - ./shared:/shared:ro
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEV_MODE: ${DEV_MODE:-true}
      API_PORT: "8000"
      APP_URL: ${APP_URL:-http://localhost:5173}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${APP_URL:-http://localhost:5173}
      SUPABASE_URL: http://supabase-kong:8000
      SUPABASE_EXTERNAL_URL: ${SUPABASE_INTERNAL_URL:-http://supabase-kong:8000}
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_AUTH_JWKS_URL: http://supabase-kong:8000/auth/v1/.well-known/jwks.json
      SUPABASE_JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      INVITE_LINK_EXPIRY_HOURS: ${INVITE_LINK_EXPIRY_HOURS:-168}
      WORKER_CALLBACK_SECRET: ${WORKER_CALLBACK_SECRET}
      DUPLICATE_SIMILARITY_THRESHOLD: ${DUPLICATE_SIMILARITY_THRESHOLD:-85}
      EMAIL_NOTIFICATIONS_ENABLED: ${EMAIL_NOTIFICATIONS_ENABLED:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
    ports:
      - "${BACKEND_HOST_PORT:-54800}:8000"
    volumes:
      - ./backend:/app
      - ./shared:/workspace/shared:ro
    depends_on:
      migration-runner:
        condition: service_completed_successfully
      redis:
        condition: service_started

  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEV_MODE: ${DEV_MODE:-true}
      REDIS_URL: redis://redis:6379/0
      BACKEND_API_URL: http://backend:8000
      WORKER_CALLBACK_SECRET: ${WORKER_CALLBACK_SECRET}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      EXTRACTION_AGENT_MODEL: ${EXTRACTION_AGENT_MODEL:-}
      EXTRACTION_AGENT_FALLBACK_MODEL: ${EXTRACTION_AGENT_FALLBACK_MODEL:-}
      GENERATION_AGENT_MODEL: ${GENERATION_AGENT_MODEL:-}
      GENERATION_AGENT_FALLBACK_MODEL: ${GENERATION_AGENT_FALLBACK_MODEL:-}
      GENERATION_AGENT_REASONING_EFFORT: ${GENERATION_AGENT_REASONING_EFFORT:-none}
      VALIDATION_AGENT_MODEL: ${VALIDATION_AGENT_MODEL:-}
      VALIDATION_AGENT_FALLBACK_MODEL: ${VALIDATION_AGENT_FALLBACK_MODEL:-}
      RESUME_JUDGE_AGENT_MODEL: ${RESUME_JUDGE_AGENT_MODEL:-openai/gpt-5.4-mini}
      RESUME_JUDGE_AGENT_FALLBACK_MODEL: ${RESUME_JUDGE_AGENT_FALLBACK_MODEL:-openai/gpt-5-mini}
      RESUME_JUDGE_AGENT_REASONING_EFFORT: ${RESUME_JUDGE_AGENT_REASONING_EFFORT:-none}
    volumes:
      - ./agents:/app
      - ./shared:/workspace/shared:ro
    ipc: host
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  supabase-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${SUPABASE_DB_HOST_PORT:-54423}:5432"
    volumes:
      - ./supabase/initdb:/docker-entrypoint-initdb.d:ro
      - supabase-db-data:/var/lib/postgresql/data

  migration-runner:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["/bin/sh", "/workspace/scripts/run_migrations.sh"]
    volumes:
      - ./supabase/migrations:/workspace/migrations:ro
      - ./scripts/run_migrations.sh:/workspace/scripts/run_migrations.sh:ro
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-auth:
        condition: service_healthy

  supabase-auth:
    image: supabase/gotrue:v2.186.0
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_NAMESPACE: auth
      GOTRUE_DB_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: ${APP_URL:-http://localhost:5173}
      GOTRUE_URI_ALLOW_LIST: ${APP_URL:-http://localhost:5173}
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_MAILER_URLPATHS_INVITE: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: /auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: /auth/v1/verify
      API_EXTERNAL_URL: ${SUPABASE_URL:-http://localhost:54421}
    depends_on:
      supabase-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 20

  supabase-rest:
    image: postgrest/postgrest:v12.2.8
    environment:
      PGRST_DB_URI: postgres://postgres:${POSTGRES_PASSWORD}@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_SECRET: ${JWT_SECRET}
      PGRST_APP_SETTINGS_JWT_EXP: "3600"
    depends_on:
      migration-runner:
        condition: service_completed_successfully

  supabase-kong:
    image: kong/kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/kong.yml
      KONG_PLUGINS: cors,key-auth,acl,request-transformer
      KONG_PROXY_ACCESS_LOG: /dev/stdout combined
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      DASHBOARD_USERNAME: supabase
      DASHBOARD_PASSWORD: local-dashboard-password
    entrypoint: ["/bin/sh", "/workspace/kong-entrypoint.sh"]
    volumes:
      - ./supabase/kong/kong.yml:/workspace/kong.yml:ro
      - ./supabase/kong/kong-entrypoint.sh:/workspace/kong-entrypoint.sh:ro
    ports:
      - "${SUPABASE_GATEWAY_PORT:-54421}:8000"
    depends_on:
      supabase-auth:
        condition: service_healthy
      supabase-rest:
        condition: service_started
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  frontend-node-modules:
  supabase-db-data:
