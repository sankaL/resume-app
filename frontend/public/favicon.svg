<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="fg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f5f59" />
      <stop offset="100%" style="stop-color:#184a45" />
    </linearGradient>
    <linearGradient id="fg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#267a72" />
      <stop offset="100%" style="stop-color:#1f5f59" />
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="#0e2f2c" />
  <!-- Back card -->
  <rect x="10" y="14" width="24" height="32" rx="5" fill="url(#fg1)" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" />
  <!-- Front card -->
  <rect x="28" y="18" width="24" height="32" rx="5" fill="url(#fg2)" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" />
  <!-- Text lines on back -->
  <line x1="15" y1="24" x2="28" y2="24" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" />
  <line x1="15" y1="30" x2="24" y2="30" stroke="rgba(255,255,255,0.25)" stroke-width="2" stroke-linecap="round" />
  <!-- Checkmark -->
  <path d="M35 32 L39 38 L49 26" fill="none" stroke="#c4501e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
