<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-labelledby="c3h-title c3h-desc">
  <title id="c3h-title">Applix Logo</title>
  <desc id="c3h-desc">Applix horizontal logo with overlapping cards icon and wordmark</desc>
  <defs>
    <linearGradient id="c3h-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f5f59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#184a45;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c3h-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#267a72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f5f59;stop-opacity:1" />
    </linearGradient>
  </defs>
  <g id="icon">
    <rect x="4" y="4" width="72" height="72" rx="18" fill="#0e2f2c" />
    <!-- Back card -->
    <rect x="14" y="16" width="30" height="40" rx="7" fill="url(#c3h-grad1)" stroke="rgba(255,255,255,0.12)" stroke-width="0.8" />
    <!-- Front card -->
    <rect x="34" y="24" width="30" height="40" rx="7" fill="url(#c3h-grad2)" stroke="rgba(255,255,255,0.15)" stroke-width="0.8" />
    <!-- Text lines on back -->
    <line x1="20" y1="28" x2="34" y2="28" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" stroke-linecap="round" />
    <line x1="20" y1="34" x2="30" y2="34" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round" />
    <!-- Checkmark on front -->
    <path d="M44 40 L48 46 L58 34" fill="none" stroke="#c4501e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Sparkle -->
    <circle cx="62" cy="26" r="2" fill="#c4501e" opacity="0.8" />
  </g>
  <g id="wordmark">
    <text x="92" y="52" font-family="'Source Sans 3', 'Inter', system-ui, sans-serif" font-size="36" font-weight="700" fill="#101828" letter-spacing="-0.5">Applix</text>
  </g>
</svg>
