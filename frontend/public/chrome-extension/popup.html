<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Applix Capture</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="panel">
      <div class="brand">
        <div class="brand-logo-shell">
          <img src="./applix-logo.svg" alt="Applix logo" class="brand-logo" />
        </div>
        <div class="brand-copy">
          <p class="eyebrow">Applix</p>
          <p class="brand-name">Capture</p>
        </div>
      </div>
      <h1>Create from current page</h1>
      <p id="status-text" class="status">Checking extension connection…</p>
      <div class="actions">
        <button id="capture-button" type="button">Create Application</button>
        <button id="open-app-button" type="button" class="secondary">Open App Setup</button>
      </div>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
  </html>
