<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-labelledby="c3-title c3-desc">
  <title id="c3-title">Applix Logo</title>
  <desc id="c3-desc">Overlapping rounded squares with a checkmark and AI sparkle, symbolizing applications linking to opportunities</desc>
  <defs>
    <linearGradient id="c3-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f5f59;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#184a45;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="c3-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3a9e92;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#267a72;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Back card (resume) -->
  <rect x="2" y="10" width="52" height="68" rx="12" fill="url(#c3-grad1)" stroke="rgba(255,255,255,0.18)" stroke-width="1.2" />
  <!-- Front card (opportunity) -->
  <rect x="38" y="22" width="52" height="68" rx="12" fill="url(#c3-grad2)" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" />
  <!-- Text lines on back card -->
  <line x1="14" y1="30" x2="38" y2="30" stroke="rgba(255,255,255,0.45)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="14" y1="40" x2="32" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="14" y1="50" x2="26" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="2.5" stroke-linecap="round" />
  <!-- Checkmark on front card -->
  <path d="M52 50 L60 60 L78 40" fill="none" stroke="#c4501e" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" />
</svg>
